<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Urodziny" />
<title>Urodziny</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeecea;
    --text: #1a1a1a;
    --text2: #666;
    --text3: #999;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 14px;
    --radius-sm: 9px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --text: #f2f2f7;
      --text2: #ababab;
      --text3: #6e6e73;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 20px 14px;
    padding-top: calc(16px + env(safe-area-inset-top));
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .header-left h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header-left p { font-size: 13px; color: var(--text2); margin-top: 1px; }

  .add-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .add-btn:active { opacity: 0.7; }

  .content { padding: 20px 16px; }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    margin: 0 4px 8px;
  }

  .section { margin-bottom: 24px; }

  /* Highlight banner for nearest birthday */
  .highlight-banner {
    background: linear-gradient(135deg, #534AB7 0%, #7B6FD4 100%);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .highlight-banner::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .highlight-banner .hl-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 17px;
    flex-shrink: 0;
    border: 2.5px solid rgba(255,255,255,0.35);
    overflow: hidden;
  }
  .highlight-banner .hl-avatar img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .highlight-banner .hl-info { flex: 1; min-width: 0; }
  .highlight-banner .hl-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.65);
    margin-bottom: 2px;
  }
  .highlight-banner .hl-name {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .highlight-banner .hl-meta {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-top: 2px;
  }
  .highlight-banner .hl-days {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: rgba(255,255,255,0.18);
    padding: 6px 12px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Soon strip (30 days) */
  .soon-strip {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .soon-strip .ss-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #F5A623;
    flex-shrink: 0;
  }
  .soon-strip .ss-name {
    flex: 1; font-size: 15px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .soon-strip .ss-days {
    font-size: 13px; color: var(--text2);
    white-space: nowrap;
  }

  .card {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 13px;
    margin-bottom: 2px;
  }
  .card:first-of-type { border-radius: var(--radius) var(--radius) var(--radius-sm) var(--radius-sm); }
  .card:last-of-type  { border-radius: var(--radius-sm) var(--radius-sm) var(--radius) var(--radius); margin-bottom: 0; }
  .card:only-of-type  { border-radius: var(--radius); }

  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 16px; font-weight: 500; }
  .card-meta { font-size: 13px; color: var(--text2); margin-top: 2px; }

  .badge {
    font-size: 12px; font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-today  { background: #EEEDFE; color: #3C3489; }
  .badge-soon   { background: #FAEEDA; color: #633806; }
  .badge-days   { color: var(--text3); font-size: 13px; font-weight: 400; }

  /* Card actions: dots menu + delete */
  .card-actions {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3);
    font-size: 20px; line-height: 1;
    padding: 4px;
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    border-radius: 6px;
  }
  .icon-btn:active { background: var(--bg3); }

  /* Dots icon (⋯) */
  .dots-icon {
    display: flex;
    align-items: center;
    gap: 2.5px;
    height: 20px;
  }
  .dots-icon span {
    width: 3.5px; height: 3.5px;
    border-radius: 50%;
    background: var(--text3);
    display: block;
  }

  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text2);
    font-size: 15px;
    line-height: 1.6;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* Modal / Sheet */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .sheet {
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    padding: 0 20px calc(20px + env(safe-area-inset-bottom));
    width: 100%;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  }
  .overlay.open .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    margin: 12px auto 20px;
  }

  .sheet h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .field input[type="text"],
  .field input[type="date"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-size: 16px;
    outline: none;
  }
  .field input:focus { border-color: #534AB7; }

  /* Photo upload */
  .photo-upload-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .photo-preview {
    width: 60px; height: 60px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px;
  }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }

  .photo-btns { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .btn-photo {
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    text-align: center;
  }
  .btn-photo:active { opacity: 0.7; }
  .btn-photo-remove {
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    border: 0.5px solid rgba(226,75,74,0.3);
    background: rgba(226,75,74,0.08);
    color: #E24B4A;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    text-align: center;
  }
  #photo-input { display: none; }

  .sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 13px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-size: 15px; font-weight: 500; cursor: pointer;
  }
  .btn-save {
    flex: 2; padding: 13px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--text);
    color: var(--bg);
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-save:active { opacity: 0.8; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Urodziny 🎂</h1>
    <p id="today-label"></p>
  </div>
  <button class="add-btn" onclick="openModal()">+ Dodaj</button>
</div>

<div class="content" id="content"></div>

<!-- Add / Edit Sheet -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="sheet-title">Nowa osoba</h2>

    <!-- Photo -->
    <div class="photo-upload-row">
      <div class="photo-preview" id="photo-preview-circle"></div>
      <div class="photo-btns">
        <button class="btn-photo" onclick="document.getElementById('photo-input').click()">📷 Dodaj zdjęcie</button>
        <button class="btn-photo-remove" id="btn-remove-photo" style="display:none" onclick="removePhoto()">Usuń zdjęcie</button>
      </div>
    </div>
    <input type="file" id="photo-input" accept="image/*" onchange="handlePhotoUpload(event)" />

    <div class="field">
      <label>Imię i nazwisko</label>
      <input type="text" id="inp-name" placeholder="np. Jan Kowalski" autocomplete="off" />
    </div>
    <div class="field">
      <label>Data urodzin</label>
      <input type="date" id="inp-date" />
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeModal()">Anuluj</button>
      <button class="btn-save" onclick="saveEntry()">Zapisz</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  {bg:'#EEEDFE',text:'#3C3489'},
  {bg:'#E1F5EE',text:'#085041'},
  {bg:'#FAECE7',text:'#4A1B0C'},
  {bg:'#E6F1FB',text:'#0C447C'},
  {bg:'#FAEEDA',text:'#633806'},
  {bg:'#FBEAF0',text:'#4B1528'},
  {bg:'#EAF3DE',text:'#27500A'},
];

function getColor(name) {
  let h = 0;
  for(let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}

function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function daysUntil(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const today = new Date(); today.setHours(0,0,0,0);
  let next = new Date(today.getFullYear(), m-1, d);
  if(next < today) next = new Date(today.getFullYear()+1, m-1, d);
  return Math.round((next - today) / 86400000);
}

function formatDate(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const months = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
  return `${d} ${months[m-1]} ${y}`;
}

function calcAge(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const today = new Date();
  let a = today.getFullYear() - y;
  if(today.getMonth()+1 < m || (today.getMonth()+1===m && today.getDate()<d)) a--;
  return a;
}

function ageSuffix(n) {
  if(n===1) return 'rok';
  if(n>=2 && n<=4) return 'lata';
  return 'lat';
}

function zodiac(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const signs = [
    { name:'Koziorożec', symbol:'♑', end:[1,19] },
    { name:'Wodnik',     symbol:'♒', end:[2,18] },
    { name:'Ryby',       symbol:'♓', end:[3,20] },
    { name:'Baran',      symbol:'♈', end:[4,19] },
    { name:'Byk',        symbol:'♉', end:[5,20] },
    { name:'Bliźnięta',  symbol:'♊', end:[6,20] },
    { name:'Rak',        symbol:'♋', end:[7,22] },
    { name:'Lew',        symbol:'♌', end:[8,22] },
    { name:'Panna',      symbol:'♍', end:[9,22] },
    { name:'Waga',       symbol:'♎', end:[10,22] },
    { name:'Skorpion',   symbol:'♏', end:[11,21] },
    { name:'Strzelec',   symbol:'♐', end:[12,21] },
    { name:'Koziorożec', symbol:'♑', end:[12,31] },
  ];
  for(const s of signs) {
    if(m < s.end[0] || (m === s.end[0] && d <= s.end[1])) return s;
  }
  return signs[0];
}

function load() {
  try { return JSON.parse(localStorage.getItem('birthdays') || '[]'); } catch(e) { return []; }
}
function save(data) {
  localStorage.setItem('birthdays', JSON.stringify(data));
}

let entries = load();
let editingId = null;
let currentPhoto = null; // base64 or null

/* ── RENDER ── */
function render() {
  const today = new Date();
  const days = ['niedziela','poniedziałek','wtorek','środa','czwartek','piątek','sobota'];
  const months = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
  document.getElementById('today-label').textContent =
    `${days[today.getDay()]}, ${today.getDate()} ${months[today.getMonth()]}`;

  const container = document.getElementById('content');
  if(entries.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎈</div>Brak zapisanych urodzin.<br>Dodaj pierwszą osobę!</div>`;
    return;
  }

  const sorted = entries.map(e => ({...e, days: daysUntil(e.date)})).sort((a,b) => a.days - b.days);
  const nearest = sorted[0];
  const soonOthers = sorted.slice(1).filter(e => e.days <= 30); // others within 30 days
  const rest = sorted.filter(e => e !== nearest && !soonOthers.includes(e));

  let html = '';

  /* ── Highlight: nearest birthday ── */
  html += `<div class="section">`;
  html += `<div class="section-label">Następne urodziny</div>`;
  html += highlightBannerHTML(nearest);
  html += `</div>`;

  /* ── Soon strip: others within 30 days ── */
  if(soonOthers.length) {
    html += `<div class="section">`;
    html += `<div class="section-label">W ciągu 30 dni</div>`;
    soonOthers.forEach(e => { html += soonStripHTML(e); });
    html += `</div>`;
  }

  /* ── Rest ── */
  if(rest.length) {
    html += `<div class="section"><div class="section-label">Pozostałe</div>`;
    rest.forEach(e => html += cardHTML(e));
    html += `</div>`;
  }

  container.innerHTML = html;
}

function avatarContent(e, size) {
  if(e.photo) {
    return `<img src="${e.photo}" alt="${e.name}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;" />`;
  }
  const col = getColor(e.name);
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${col.bg};color:${col.text};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${Math.round(size*0.33)}px;flex-shrink:0;">${initials(e.name)}</div>`;
}

function highlightBannerHTML(e) {
  const a = calcAge(e.date);
  const z = zodiac(e.date);
  let daysLabel;
  if(e.days === 0) daysLabel = '🎉 Dzisiaj!';
  else if(e.days === 1) daysLabel = 'Jutro!';
  else daysLabel = `za ${e.days} dni`;

  const avatarInner = e.photo
    ? `<img src="${e.photo}" alt="${e.name}" />`
    : `<span style="color:#fff;font-weight:700;font-size:17px;">${initials(e.name)}</span>`;

  return `<div class="highlight-banner">
    <div class="hl-avatar">${avatarInner}</div>
    <div class="hl-info">
      <div class="hl-label">Najbliższe urodziny</div>
      <div class="hl-name">${e.name}</div>
      <div class="hl-meta">${formatDate(e.date)} · ${a} ${ageSuffix(a)} · ${z.symbol} ${z.name}</div>
    </div>
    <div class="hl-days">${daysLabel}</div>
  </div>`;
}

function soonStripHTML(e) {
  const daysLabel = e.days === 0 ? 'Dzisiaj!' : e.days === 1 ? 'Jutro' : `za ${e.days} dni`;
  return `<div class="soon-strip">
    <div class="ss-dot"></div>
    ${avatarContent(e, 36)}
    <div class="ss-name">${e.name}</div>
    <div class="ss-days">${daysLabel}</div>
    <div class="card-actions">
      <button class="icon-btn" onclick="openEdit('${e.id}')" title="Edytuj">
        <div class="dots-icon"><span></span><span></span><span></span></div>
      </button>
      <button class="icon-btn" onclick="deleteEntry('${e.id}')" title="Usuń" style="font-size:18px;">×</button>
    </div>
  </div>`;
}

function cardHTML(e) {
  const a = calcAge(e.date);
  let badge = '';
  if(e.days === 0) badge = `<span class="badge badge-today">Dzisiaj!</span>`;
  else if(e.days <= 7) badge = `<span class="badge badge-soon">za ${e.days} dni</span>`;
  else badge = `<span class="badge-days">${e.days} dni</span>`;

  return `<div class="card">
    ${avatarContent(e, 46)}
    <div class="card-info">
      <div class="card-name">${e.name}</div>
      <div class="card-meta">${formatDate(e.date)} · ${a} ${ageSuffix(a)} · ${zodiac(e.date).symbol} ${zodiac(e.date).name}</div>
    </div>
    ${badge}
    <div class="card-actions">
      <button class="icon-btn" onclick="openEdit('${e.id}')" title="Edytuj">
        <div class="dots-icon"><span></span><span></span><span></span></div>
      </button>
      <button class="icon-btn" onclick="deleteEntry('${e.id}')" title="Usuń" style="font-size:18px;">×</button>
    </div>
  </div>`;
}

/* ── MODAL ── */
function openModal() {
  editingId = null;
  currentPhoto = null;
  document.getElementById('sheet-title').textContent = 'Nowa osoba';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-date').value = '';
  updatePhotoPreview(null, '');
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-name').focus(), 300);
}

function openEdit(id) {
  const entry = entries.find(e => e.id === id);
  if(!entry) return;
  editingId = id;
  currentPhoto = entry.photo || null;
  document.getElementById('sheet-title').textContent = 'Edytuj osobę';
  document.getElementById('inp-name').value = entry.name;
  document.getElementById('inp-date').value = entry.date;
  updatePhotoPreview(entry.photo || null, entry.name);
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-name').focus(), 300);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
  currentPhoto = null;
}

function overlayClick(ev) {
  if(ev.target === document.getElementById('overlay')) closeModal();
}

function saveEntry() {
  const name = document.getElementById('inp-name').value.trim();
  const date = document.getElementById('inp-date').value;
  if(!name || !date) return;

  if(editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if(idx !== -1) {
      entries[idx] = { ...entries[idx], name, date, photo: currentPhoto || undefined };
      if(!currentPhoto) delete entries[idx].photo;
    }
  } else {
    const entry = { id: Date.now().toString(), name, date };
    if(currentPhoto) entry.photo = currentPhoto;
    entries.push(entry);
  }

  save(entries);
  closeModal();
  render();
}

function deleteEntry(id) {
  if(!confirm('Usunąć tę osobę?')) return;
  entries = entries.filter(e => e.id !== id);
  save(entries);
  render();
}

/* ── PHOTO ── */
function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    currentPhoto = e.target.result;
    updatePhotoPreview(currentPhoto, document.getElementById('inp-name').value || '?');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removePhoto() {
  currentPhoto = null;
  updatePhotoPreview(null, document.getElementById('inp-name').value || '?');
}

function updatePhotoPreview(photo, name) {
  const circle = document.getElementById('photo-preview-circle');
  const removeBtn = document.getElementById('btn-remove-photo');
  if(photo) {
    circle.innerHTML = `<img src="${photo}" alt="preview" style="width:60px;height:60px;object-fit:cover;border-radius:50%;" />`;
    circle.style.background = '';
    circle.style.color = '';
    removeBtn.style.display = 'block';
  } else {
    const col = name ? getColor(name) : {bg:'var(--bg3)', text:'var(--text3)'};
    circle.style.background = col.bg;
    circle.style.color = col.text;
    circle.innerHTML = name ? initials(name) : '?';
    removeBtn.style.display = 'none';
  }
}

document.getElementById('inp-name').addEventListener('input', () => {
  if(!currentPhoto) {
    updatePhotoPreview(null, document.getElementById('inp-name').value);
  }
});

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
render();
</script>
</body>
</html>
